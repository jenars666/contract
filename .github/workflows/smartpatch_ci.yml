name: SmartPatch Auto-Fix Integration

on:
  push:
    branches:
      - main
    paths:
      - '**.sol'  # Only trigger when Solidity files are changed
  workflow_dispatch:  # A button to trigger the workflow manually in the GitHub UI

jobs:
  auto_patch_pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push code back

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Important to do a proper push

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install slither-analyzer==0.10.0 crytic-compile==0.3.6
          
      - name: Install Blockchain Compilers (solc)
        run: |
          sudo npm install -g solc@0.8.19

      - name: Execute Autonomous SmartPatch Loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # LLM Key dynamically taken from Github Secrets
        run: |
          # Evaluate contract, patch -> loops until bugs removed
          python autofix_ci.py target_contracts/

      - name: Commit and Push Bug-Free Code
        run: |
          git config --global user.name "SmartPatch-AutoRepair"
          git config --global user.email "bot@smartpatch.local"
          git add .
          
          # Check if there are changes to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-fixed vulnerability issues via SmartPatch 🛠️"
            git push origin HEAD
          else
            echo "✅ No vulnerabilities needed patching. Baseline is secure."
          fi
