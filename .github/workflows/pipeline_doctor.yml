name: SmartPatch Pipeline Doctor

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-heal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          
      - name: Run Slither (Security Check)
        id: slither
        run: slither . --json slither_report.json
        continue-on-error: true

      - name: Run Pipeline Doctor 🩺
        if: steps.slither.outcome == 'failure'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_PROVIDER: openrouter
          LLM_MODEL: anthropic/claude-3.5-sonnet
        run: |
          # If Slither fails, the Doctor analyzes, patches, and opens a PR
          python pipeline_doctor.py contract.sol
